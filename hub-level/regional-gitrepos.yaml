spec:
  # Apunta al servidor Gitea local del piloto
  repo: "http://10.99.0.13:3000/repsol/repsol-fleet-gitops.git"
  branch: main
  paths:
    - regional-level-sur
  helmSecretName: oci-helm-secret
  targets:
    - clusterSelector:
        matchLabels:
          role: regional-shard
          region: sur
