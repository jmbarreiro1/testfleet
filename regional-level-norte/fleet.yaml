defaultNamespace: apps-norte

targets:
  - name: grupo-fabricas-norte
    clusterSelector:
      matchLabels:
        entorno: prueba

# Personalizaciones específicas por ubicación Edge
targetCustomizations:
  - name: edge-vigo-values
    clusterName: local
    helm:
      valuesFiles:
        - sitios-valores/vigo.yaml

  - name: edge-coruna-values
    clusterName: edge-coruna
    helm:
      valuesFiles:
        - sitios-valores/coruna.yaml
